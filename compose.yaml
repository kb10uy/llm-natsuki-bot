services:
  bot:
    build:
      dockerfile: "./docker/Dockerfile.lnb-server"
      context: "."
      args:
        GIT_COMMIT_HASH: "unknown"
    stop_grace_period: "2s"
    environment:
      TZ: "Asia/Tokyo"
      RUST_LOG: "warn,lnb_server=info,lnb_mastodon_client=info,lnb_discord_client=info"
    volumes:
      - "./data:/data"
    depends_on:
      - "valkey"
      - "math-renderer"

  math-renderer:
    build:
      dockerfile: "./docker/Dockerfile.lnb-math-renderer"
      context: "."
    stop_grace_period: "2s"
    expose:
      - 3000

  api:
    build:
      dockerfile: "./docker/Dockerfile.lnb-admin-api"
      context: "."
      args:
        GIT_COMMIT_HASH: "unknown"
    stop_grace_period: "2s"
    environment:
      TZ: "Asia/Tokyo"
      RUST_LOG: "warn,lnb_admin_api=info"
    volumes:
      - "./data:/data"
    depends_on:
      - "valkey"

  valkey:
    image: "mirror.gcr.io/valkey/valkey:9.0-alpine"
    environment:
      VALKEY_EXTRA_FLAGS: "--save 60 1 --loglevel warning"
    volumes:
      - "./data/valkey:/data"
    expose:
      - 6379
